<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP Brunch — Margaux & Léopold</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
<style>
@font-face {
  font-family: 'OpeningHours';
  src: url('../fonts/OpeningHoursSans-Regular.otf') format('opentype');
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'RecifeDisplay';
  src: url('../fonts/RecifeDisplay-LightItalic.woff2') format('woff2'),
       url('../fonts/RecifeDisplay-LightItalic.woff') format('woff'),
       url('../fonts/RecifeDisplay-LightItalic.ttf') format('truetype');
  font-weight: 100 900; font-style: italic; font-display: swap;
}
:root { --cream: #f5ede0; --burgundy: #67102a; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'OpeningHours', sans-serif; color: var(--burgundy);
  background: linear-gradient(170deg, #F5EDE0 0%, #FAF5EE 40%, #F2E8DA 100%);
  background-attachment: fixed; min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px 60px;
}
.form-container { width: 100%; max-width: 520px; }
.form-header {
  text-align: center; margin-bottom: 40px;
  opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease forwards;
}
.form-header h1 {
  font-family: 'RecifeDisplay', serif; font-style: italic;
  font-size: 2.4rem; font-weight: 300; line-height: 1.2; margin-bottom: 10px;
}
.form-header .subtitle {
  font-size: 14px; letter-spacing: 1px; text-transform: uppercase;
  opacity: 0.6; margin-bottom: 8px;
}
.form-header .divider {
  width: 50px; height: 1px; background: var(--burgundy); opacity: 0.3; margin: 20px auto 0;
}
.form-header .notice {
  font-style: italic; font-size: 13px; opacity: 0.5; margin-top: 16px; line-height: 1.5;
}
.family-notice {
  font-style: italic; font-size: 14px; opacity: 0.55;
  text-align: center; margin-bottom: 30px; line-height: 1.5;
}
.section-label {
  font-family: 'RecifeDisplay', serif; font-style: italic;
  font-size: 1.4rem; font-weight: 300; margin-bottom: 20px;
}
.person-card { margin-bottom: 36px; }
.person-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
}
.person-header .section-label { margin-bottom: 0; }
.remove-person {
  background: none; border: 1px solid rgba(103,16,42,0.2); border-radius: 4px;
  color: var(--burgundy); opacity: 0.5; font-size: 13px; padding: 4px 12px;
  cursor: pointer; font-family: 'OpeningHours', sans-serif; transition: opacity 0.3s;
}
.remove-person:hover { opacity: 0.8; }
.field { margin-bottom: 18px; }
.field label {
  display: block; font-size: 13px; letter-spacing: 0.5px;
  text-transform: uppercase; opacity: 0.6; margin-bottom: 6px;
}
.field input, .field textarea {
  width: 100%; padding: 12px 16px;
  font-family: 'OpeningHours', sans-serif; font-size: 16px; color: var(--burgundy);
  background: rgba(255,255,255,0.5);
  border: 1px solid rgba(103,16,42,0.15); border-radius: 6px;
  outline: none; transition: border-color 0.3s;
}
.field input:focus, .field textarea:focus { border-color: rgba(103,16,42,0.4); }
.field textarea { resize: vertical; min-height: 70px; }
.field input::placeholder, .field textarea::placeholder { color: var(--burgundy); opacity: 0.35; }
.presence-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid rgba(103,16,42,0.08);
}
.presence-row:last-child { border-bottom: none; }
.presence-label { font-size: 16px; }
.presence-toggle {
  display: flex; gap: 0; border: 1px solid rgba(103,16,42,0.2); border-radius: 4px; overflow: hidden;
}
.toggle-option {
  padding: 8px 18px; font-size: 14px; text-align: center;
  font-family: 'OpeningHours', sans-serif;
  cursor: pointer; transition: all 0.3s ease;
  background: transparent; color: var(--burgundy); opacity: 0.6;
}
.toggle-option.active { background: var(--burgundy); color: var(--cream); opacity: 1; }
.toggle-option:hover:not(.active) { opacity: 0.8; background: rgba(103,16,42,0.05); }
.add-person-btn {
  display: block; width: 100%; padding: 14px;
  font-family: 'OpeningHours', sans-serif; font-size: 15px;
  color: var(--burgundy); background: transparent;
  border: 1px dashed rgba(103,16,42,0.25); border-radius: 6px;
  cursor: pointer; transition: all 0.3s; margin-bottom: 36px; text-align: center;
}
.add-person-btn:hover { background: rgba(103,16,42,0.04); border-color: rgba(103,16,42,0.4); }
.submit-btn {
  display: block; width: 100%; padding: 16px;
  font-family: 'OpeningHours', sans-serif; font-size: 15px;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--cream); background: var(--burgundy);
  border: none; border-radius: 6px; cursor: pointer;
  transition: opacity 0.3s, transform 0.2s; margin-top: 10px;
}
.submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.confirmation {
  display: none; text-align: center; padding: 60px 20px;
  opacity: 0; transform: translateY(20px);
}
.confirmation.show { display: block; animation: fadeUp 0.6s ease forwards; }
.confirmation h2 {
  font-family: 'RecifeDisplay', serif; font-style: italic;
  font-size: 2rem; font-weight: 300; margin-bottom: 16px;
}
.confirmation p { font-size: 16px; opacity: 0.7; line-height: 1.6; }
.confirmation .heart { font-size: 24px; margin-top: 20px; display: block; animation: pulse 2s ease infinite; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
@media (max-width: 600px) {
  body { padding: 30px 16px 50px; }
  .form-header h1 { font-size: 2rem; }
  .section-label { font-size: 1.2rem; }
}
</style>
</head>
<body>
<div class="form-container">
  <div class="form-header">
    <h1>Margaux & Léopold</h1>
    <p class="subtitle">Brunch — 30 août 2026</p>
    <div class="divider"></div>
  </div>
  <p class="family-notice">Si vous venez en famille, merci d'indiquer les personnes qui viennent avec vous.</p>
  <form id="rsvp-form" autocomplete="off">
    <div id="persons-container">
      <div class="person-card" data-index="0">
        <p class="section-label">Vos informations</p>
        <div class="field"><label>Nom *</label><input type="text" class="p-nom" required placeholder="Nom"></div>
        <div class="field"><label>Prénom *</label><input type="text" class="p-prenom" required placeholder="Prénom"></div>
        <div class="presence-row">
          <span class="presence-label">Présent(e) au brunch ?</span>
          <div class="presence-toggle" data-field="brunch">
            <div class="toggle-option active" data-value="Oui">Oui</div>
            <div class="toggle-option" data-value="Non">Non</div>
          </div>
        </div>
      </div>
    </div>
    <button type="button" class="add-person-btn" id="add-person-btn">+ Ajouter une personne</button>
    <button type="submit" class="submit-btn" id="submit-btn">Confirmer ma réponse</button>
  </form>
  <div class="confirmation" id="confirmation">
    <h2>Merci !</h2>
    <p>Votre réponse a bien été enregistrée.<br>Vous allez être redirigé(e)…</p>
    <span class="heart">&#9829;</span>
  </div>
</div>
<script>
(function() {
  var container = document.getElementById('persons-container');
  var form = document.getElementById('rsvp-form');
  var confirmation = document.getElementById('confirmation');
  var submitBtn = document.getElementById('submit-btn');

  function initToggles(root) {
    root.querySelectorAll('.presence-toggle').forEach(function(group) {
      group.querySelectorAll('.toggle-option').forEach(function(opt) {
        opt.addEventListener('click', function() {
          group.querySelectorAll('.toggle-option').forEach(function(o) { o.classList.remove('active'); });
          opt.classList.add('active');
        });
      });
    });
  }
  initToggles(document);

  document.getElementById('add-person-btn').addEventListener('click', function() {
    var card = document.createElement('div');
    card.className = 'person-card';
    card.innerHTML = '<div class="person-header"><p class="section-label">Accompagnant(e)</p><button type="button" class="remove-person">Retirer</button></div>'
      + '<div class="field"><label>Nom *</label><input type="text" class="p-nom" required placeholder="Nom"></div>'
      + '<div class="field"><label>Prénom *</label><input type="text" class="p-prenom" required placeholder="Prénom"></div>'
      + '<div class="presence-row"><span class="presence-label">Présent(e) au brunch ?</span><div class="presence-toggle" data-field="brunch"><div class="toggle-option active" data-value="Oui">Oui</div><div class="toggle-option" data-value="Non">Non</div></div></div>'
    container.appendChild(card);
    initToggles(card);
    card.querySelector('.remove-person').addEventListener('click', function() { card.remove(); });
  });

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi en cours…';
    var cards = container.querySelectorAll('.person-card');
    var persons = [];
    cards.forEach(function(card) {
      var toggle = card.querySelector('.presence-toggle[data-field="brunch"] .toggle-option.active');
      persons.push({
        nom: card.querySelector('.p-nom').value.trim(),
        prenom: card.querySelector('.p-prenom').value.trim(),
        cocktail: '', diner: '',
        brunch: toggle ? toggle.dataset.value : 'Oui'
      });
    });
    var payload = {
      type: 'Brunch', persons: persons,
      messe_participation: 'Non répondu', messe_detail: ''
    };
    try {
      var resp = await fetch('/api/rsvp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      var data = await resp.json();
      if (!data.success) throw new Error(data.error || 'Erreur');
      form.style.display = 'none';
      confirmation.classList.add('show');
      setTimeout(function() { window.location.href = 'https://www.margauxetleopold.fr/'; }, 3000);
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Confirmer ma réponse';
      alert('Une erreur est survenue. Veuillez réessayer.');
      console.error(err);
    }
  });
})();
</script>
</body>
</html>
